<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研究費予算管理 - 3年間計画</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --accent: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--gray-50);
    color: var(--gray-800);
    line-height: 1.6;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

  header {
    background: linear-gradient(135deg, #1e40af, #3b82f6);
    color: white;
    padding: 32px 0;
    margin-bottom: 32px;
  }
  header h1 { font-size: 1.8rem; font-weight: 700; }
  header p { opacity: .85; margin-top: 4px; font-size: .95rem; }
  .header-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-top: 24px;
  }
  .stat-card {
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(8px);
    border-radius: var(--radius);
    padding: 16px 20px;
    border: 1px solid rgba(255,255,255,.2);
  }
  .stat-card .label { font-size: .8rem; opacity: .8; }
  .stat-card .value { font-size: 1.5rem; font-weight: 700; margin-top: 2px; }
  .stat-card .sub { font-size: .75rem; opacity: .7; margin-top: 2px; }
  .stat-card .spent-info { font-size: .8rem; margin-top: 4px; opacity: .9; }
  .stat-card .spent-info .spent-val { font-weight: 700; color: #fde68a; }

  .section { margin-bottom: 32px; }
  .section-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .icon {
    width: 28px; height: 28px;
    background: var(--primary-light);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: .9rem;
  }

  /* Expense Form */
  .expense-form-card {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    border-top: 4px solid var(--primary);
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: .8rem;
    font-weight: 600;
    color: var(--gray-600);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: .03em;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--gray-300);
    border-radius: 8px;
    font-size: .9rem;
    font-family: inherit;
    transition: border-color .2s;
    background: white;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  }
  .form-group textarea { resize: vertical; min-height: 40px; }
  .form-actions { display: flex; gap: 8px; align-items: flex-end; }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger { background: var(--danger); color: white; font-size: .75rem; padding: 4px 10px; }
  .btn-danger:hover { background: #dc2626; }
  .btn-outline {
    background: white;
    color: var(--gray-700);
    border: 1.5px solid var(--gray-300);
  }
  .btn-outline:hover { background: var(--gray-100); }
  .btn-export { background: var(--success); color: white; }
  .btn-export:hover { background: #059669; }

  /* Budget tracker cards */
  .tracker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .tracker-card {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--primary);
  }
  .tracker-card.rep { border-left-color: var(--accent); }
  .tracker-card .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .tracker-card .name {
    font-weight: 700;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tracker-card .budget-summary {
    text-align: right;
    font-size: .8rem;
    color: var(--gray-600);
  }
  .tracker-card .budget-summary .remaining { font-weight: 700; font-size: .95rem; }
  .tracker-card .budget-summary .remaining.over { color: var(--danger); }
  .tracker-card .budget-summary .remaining.ok { color: var(--success); }

  .budget-row {
    margin-bottom: 10px;
  }
  .budget-row .budget-label {
    display: flex;
    justify-content: space-between;
    font-size: .82rem;
    margin-bottom: 3px;
    color: var(--gray-700);
  }
  .budget-row .budget-label .amounts { font-weight: 500; }
  .budget-bar-track {
    height: 20px;
    background: var(--gray-100);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .budget-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width .4s ease;
    display: flex;
    align-items: center;
    padding-left: 6px;
    font-size: .68rem;
    color: white;
    font-weight: 600;
    white-space: nowrap;
  }
  .budget-bar-fill.ok { background: linear-gradient(90deg, #059669, #10b981); }
  .budget-bar-fill.warn { background: linear-gradient(90deg, #d97706, #f59e0b); }
  .budget-bar-fill.over { background: linear-gradient(90deg, #dc2626, #ef4444); }

  .role-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: .7rem;
    font-weight: 600;
  }
  .role-badge.rep { background: #fef3c7; color: #92400e; }
  .role-badge.member { background: #dbeafe; color: #1e40af; }

  /* Expense History */
  .history-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .history-controls select, .history-controls input {
    padding: 6px 10px;
    border: 1.5px solid var(--gray-300);
    border-radius: 6px;
    font-size: .85rem;
    font-family: inherit;
  }
  .table-wrapper {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  thead th {
    background: var(--gray-50);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    color: var(--gray-600);
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .03em;
    border-bottom: 2px solid var(--gray-200);
    white-space: nowrap;
  }
  thead th.num { text-align: right; }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--gray-100); }
  tbody td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
  tbody tr:hover { background: var(--gray-50); }
  tbody tr.subtotal { background: var(--primary-light); font-weight: 700; }
  tbody tr.subtotal td { border-bottom: 2px solid var(--primary); }
  tbody tr.grand-total {
    background: linear-gradient(135deg, #1e40af, #3b82f6);
    color: white; font-weight: 700;
  }
  tbody tr.grand-total td { border-bottom: none; font-size: .9rem; }

  .expense-desc { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--gray-500);
    font-size: .9rem;
  }

  /* Year tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    background: var(--gray-200);
    color: var(--gray-700);
    font-weight: 600;
    font-size: .88rem;
    cursor: pointer;
    transition: all .2s;
  }
  .tab.active { background: var(--primary); color: white; }
  .tab:hover:not(.active) { background: var(--gray-300); }

  /* Charts */
  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }
  @media (max-width: 768px) { .chart-row { grid-template-columns: 1fr; } }
  .chart-card {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .chart-card h3 { font-size: .95rem; color: var(--gray-700); margin-bottom: 16px; }

  /* Annual Plan */
  .plan-card {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    border-top: 4px solid var(--accent);
  }
  .plan-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 700px) { .plan-columns { grid-template-columns: 1fr; } }
  .plan-columns h4 {
    font-size: .85rem;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--gray-200);
  }
  .plan-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    font-size: .9rem;
    border-bottom: 1px dashed var(--gray-200);
  }
  .plan-item:last-child { border-bottom: none; }
  .plan-bullet {
    flex-shrink: 0;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 7px;
  }
  .plan-members {
    font-size: .78rem;
    color: var(--gray-500);
    margin-top: 2px;
  }

  .donut-container { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .donut { width: 140px; height: 140px; border-radius: 50%; position: relative; flex-shrink: 0; }
  .donut-hole {
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:80px;height:80px;background:white;border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
  }
  .donut-center { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center; }
  .donut-center .amount { font-size: 1.2rem; font-weight: 700; color: var(--gray-900); }
  .donut-center .unit { font-size: .7rem; color: var(--gray-600); }
  .legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: .85rem; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend-value { color: var(--gray-600); margin-left: auto; font-weight: 600; min-width: 70px; text-align: right; }

  .bar-group { margin-bottom: 14px; }
  .bar-label { display: flex; justify-content: space-between; font-size: .85rem; margin-bottom: 4px; color: var(--gray-700); }
  .bar-track { height: 24px; background: var(--gray-100); border-radius: 6px; overflow: hidden; }
  .bar-fill {
    height: 100%; border-radius: 6px; transition: width .6s ease;
    display: flex; align-items: center; padding-left: 8px;
    font-size: .7rem; color: white; font-weight: 600; white-space: nowrap;
  }

  .stacked-bar { display: flex; height: 32px; border-radius: 6px; overflow: hidden; margin-bottom: 6px; }
  .stacked-bar .seg {
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; color: white; font-weight: 600; transition: width .6s ease; min-width: 0;
  }
  .stacked-bar .seg span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 4px; }

  .c1 { background: #3b82f6; }
  .c2 { background: #10b981; }
  .c3 { background: #f59e0b; }
  .c4 { background: #ef4444; }
  .c5 { background: #8b5cf6; }
  .c6 { background: #ec4899; }
  .c7 { background: #14b8a6; }

  /* Overall Plan pillars */
  .pillars {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 700px) { .pillars { grid-template-columns: 1fr; } }
  .pillar {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    border-top: 4px solid var(--primary);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .pillar-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    color: white;
    font-size: .8rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .pillar h4 {
    font-size: .95rem;
    font-weight: 700;
    color: var(--gray-900);
    line-height: 1.5;
  }
  .pillar p {
    font-size: .82rem;
    color: var(--gray-600);
    line-height: 1.6;
  }

  /* Members */
  .members-card {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .members-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 20px;
    align-items: baseline;
  }
  .member-role {
    font-size: .78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .03em;
    white-space: nowrap;
  }
  .member-list {
    font-size: .9rem;
    line-height: 1.8;
  }
  .member-name {
    display: inline-block;
    margin-right: 6px;
  }
  .member-affil {
    font-size: .78rem;
    color: var(--gray-500);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.4); z-index: 1000;
    justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white; border-radius: var(--radius); padding: 28px;
    max-width: 420px; width: 90%; box-shadow: var(--shadow-lg);
  }
  .modal h3 { margin-bottom: 12px; }
  .modal p { font-size: .9rem; color: var(--gray-600); margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  footer { text-align: center; padding: 24px; color: var(--gray-600); font-size: .8rem; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .tracker-grid { grid-template-columns: 1fr; }
  }

  /* Auth screen */
  #authScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, #1e40af, #3b82f6);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #authScreen .auth-box {
    background: white;
    border-radius: var(--radius);
    padding: 40px;
    box-shadow: var(--shadow-lg);
    text-align: center;
    max-width: 380px;
    width: 90%;
  }
  #authScreen h2 { font-size: 1.3rem; margin-bottom: 6px; color: var(--gray-900); }
  #authScreen .auth-sub { font-size: .85rem; color: var(--gray-500); margin-bottom: 24px; }
  #authScreen input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    text-align: center;
    letter-spacing: .1em;
    margin-bottom: 12px;
  }
  #authScreen input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  #authScreen .auth-error {
    color: var(--danger);
    font-size: .82rem;
    margin-bottom: 10px;
    min-height: 1.2em;
  }
  .content-locked { display: none; }
  .content-unlocked { display: block; }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="authScreen">
  <div class="auth-box">
    <h2>研究費予算管理</h2>
    <p class="auth-sub">メンバー専用ページです</p>
    <input type="password" id="authInput" placeholder="パスワードを入力" autofocus>
    <div class="auth-error" id="authError"></div>
    <button class="btn btn-primary" style="width:100%;" onclick="tryAuth()">ログイン</button>
    <p style="margin-top:16px;font-size:.82rem;text-align:center;color:var(--gray-500);">
      <a href="index.html" style="color:var(--gray-600);text-decoration:none;">← ホーム</a>
      <span style="margin:0 8px;opacity:.4;">|</span>
      <a href="plan.html" style="color:var(--primary);text-decoration:none;font-weight:600;">2026年度 研究計画 ▸</a>
    </p>
  </div>

<script>
// ── Auth ──
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function decryptContent(password) {
  const b64 = document.getElementById("encryptedData").textContent;
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = raw.slice(0, 16);
  const iv = raw.slice(16, 28);
  const ciphertext = raw.slice(28);
  const key = await deriveKey(password, salt);
  const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ciphertext);
  return new TextDecoder().decode(decrypted);
}

async function tryAuth() {
  const input = document.getElementById("authInput").value;
  try {
    const plaintext = await decryptContent(input);
    // Split into HTML content and script
    const scriptMatch = plaintext.match(/<script>[\s\S]*<\/script>/);
    const htmlPart = plaintext.replace(/<script>[\s\S]*<\/script>/, "");
    // Parse the HTML to extract inner content
    const temp = document.createElement("div");
    temp.innerHTML = htmlPart;
    const innerContent = temp.querySelector("#mainContent");
    if (innerContent) {
      document.getElementById("mainContent").innerHTML = innerContent.innerHTML;
    } else {
      document.getElementById("mainContent").innerHTML = htmlPart;
    }
    // Execute the script
    if (scriptMatch) {
      const scriptContent = scriptMatch[0].replace(/<\/?script>/g, "");
      const s = document.createElement("script");
      s.textContent = scriptContent;
      document.body.appendChild(s);
    }
    document.getElementById("authScreen").style.display = "none";
    document.getElementById("mainContent").classList.remove("content-locked");
    document.getElementById("mainContent").classList.add("content-unlocked");
    sessionStorage.setItem("authed_pw", input);
    init();
  } catch (e) {
    document.getElementById("authError").textContent = "パスワードが違います";
    document.getElementById("authInput").value = "";
    document.getElementById("authInput").focus();
  }
}

// Enter key support
document.getElementById("authInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") tryAuth();
});

// Session persistence
(async function() {
  const savedPw = sessionStorage.getItem("authed_pw");
  if (savedPw) {
    try {
      const plaintext = await decryptContent(savedPw);
      const scriptMatch = plaintext.match(/<script>[\s\S]*<\/script>/);
      const htmlPart = plaintext.replace(/<script>[\s\S]*<\/script>/, "");
      const temp = document.createElement("div");
      temp.innerHTML = htmlPart;
      const innerContent = temp.querySelector("#mainContent");
      if (innerContent) {
        document.getElementById("mainContent").innerHTML = innerContent.innerHTML;
      } else {
        document.getElementById("mainContent").innerHTML = htmlPart;
      }
      if (scriptMatch) {
        const scriptContent = scriptMatch[0].replace(/<\/?script>/g, "");
        const s = document.createElement("script");
        s.textContent = scriptContent;
        document.body.appendChild(s);
      }
      document.getElementById("authScreen").style.display = "none";
      document.getElementById("mainContent").classList.remove("content-locked");
      document.getElementById("mainContent").classList.add("content-unlocked");
      init();
    } catch(e) {
      sessionStorage.removeItem("authed_pw");
    }
  }
})();
</script>
